# HTTP → HTTPS + Let's Encrypt challenge
server {
    listen 80;
    listen [::]:80;
    server_name checkpricecs2.io.vn www.checkpricecs2.io.vn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/checkpricecs2/public;
        allow all;
    }

    location / {
        return 301 https://checkpricecs2.io.vn$request_uri;
    }
}

# HTTPS — www → apex (og:url khớp link chia sẻ)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.checkpricecs2.io.vn;

    ssl_certificate /etc/letsencrypt/live/checkpricecs2.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/checkpricecs2.io.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://checkpricecs2.io.vn$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name checkpricecs2.io.vn;

    ssl_certificate /etc/letsencrypt/live/checkpricecs2.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/checkpricecs2.io.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/checkpricecs2/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    client_max_body_size 20M;
}
